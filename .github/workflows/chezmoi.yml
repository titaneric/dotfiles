name: chezmoi

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: "false"
          GITLEAKS_VERSION: "8.30.1"

  public-render:
    name: Public render (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install chezmoi
        shell: bash
        run: |
          set -euo pipefail
          sh -c "$(curl -fsLS get.chezmoi.io)" -- -b "$HOME/bin"
          echo "$HOME/bin" >> "$GITHUB_PATH"

      - name: Install fish
        shell: bash
        run: |
          set -euo pipefail
          if [ "$RUNNER_OS" = "Linux" ]; then
            sudo apt-get update
            sudo apt-get install -y fish
          elif [ "$RUNNER_OS" = "macOS" ]; then
            brew install fish
          else
            echo "Unsupported runner OS for fish install: $RUNNER_OS" >&2
            exit 1
          fi

      - name: Prepare fake home
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/home"

      - name: Apply public config without scripts
        shell: bash
        env:
          HOME: ${{ runner.temp }}/home
        run: |
          set -euo pipefail
          chezmoi \
            --source "$GITHUB_WORKSPACE" \
            --destination "$HOME" \
            apply --exclude scripts --force

      - name: Check public fish syntax
        shell: bash
        env:
          HOME: ${{ runner.temp }}/home
        run: |
          set -euo pipefail
          fish -n "$HOME/.config/fish/config.fish"
          test ! -e "$HOME/Brewfile-company"

      - name: Check rendered script syntax
        shell: bash
        env:
          HOME: ${{ runner.temp }}/home
        run: |
          set -euo pipefail
          for script in "$GITHUB_WORKSPACE"/.chezmoiscripts/*.sh.tmpl; do
            [ -e "$script" ] || continue
            rendered_script="$RUNNER_TEMP/$(basename "$script" .tmpl)"
            chezmoi \
              --source "$GITHUB_WORKSPACE" \
              --destination "$HOME" \
              execute-template --file "$script" > "$rendered_script"
            if [ -s "$rendered_script" ]; then
              bash -n "$rendered_script"
            fi
          done

      - name: Check fish default shell script behavior
        shell: bash
        env:
          HOME: ${{ runner.temp }}/home
        run: |
          set -euo pipefail
          rendered_script="$RUNNER_TEMP/set-default-shell-fish.sh"
          shells_file="$RUNNER_TEMP/shells"
          fake_bin_dir="$RUNNER_TEMP/fake-bin"
          chsh_log="$RUNNER_TEMP/chsh.log"

          mkdir -p "$fake_bin_dir"
          printf '/bin/sh\n/bin/bash\n' > "$shells_file"
          cat > "$fake_bin_dir/chsh" <<'EOF'
          #!/usr/bin/env bash
          printf '%s\n' "$*" > "$CHEZMOI_CHSH_LOG"
          EOF
          chmod +x "$fake_bin_dir/chsh"

          chezmoi \
            --source "$GITHUB_WORKSPACE" \
            --destination "$HOME" \
            execute-template --file "$GITHUB_WORKSPACE/.chezmoiscripts/run_onchange_after_08-set-default-shell-fish.sh.tmpl" \
            > "$rendered_script"
          bash -n "$rendered_script"

          env \
            CHEZMOI_SHELLS_FILE="$shells_file" \
            CHEZMOI_CHSH_BIN="$fake_bin_dir/chsh" \
            CHEZMOI_CHSH_LOG="$chsh_log" \
            CHEZMOI_CURRENT_SHELL="/bin/zsh" \
            USER="ci-user" \
            bash "$rendered_script"

          fish_path="$(command -v fish)"
          grep -Fxq "$fish_path" "$shells_file"
          grep -Fxq -- "-s $fish_path ci-user" "$chsh_log"

      - name: Check git-ai installer syntax with sample data
        shell: bash
        env:
          HOME: ${{ runner.temp }}/home
        run: |
          set -euo pipefail
          chezmoi \
            --source "$GITHUB_WORKSPACE" \
            --destination "$HOME" \
            execute-template \
            --override-data '{"git":{"gitAI":{"enabled":true,"releaseTag":"latest","trace2EventTarget":"af_unix:stream:/tmp/git-ai/trace2.sock"}}}' \
            --file "$GITHUB_WORKSPACE/.chezmoiscripts/run_onchange_after_15-install-git-ai.sh.tmpl" \
            > "$RUNNER_TEMP/install-git-ai.sh"
          bash -n "$RUNNER_TEMP/install-git-ai.sh"

  sample-company-render:
    name: Sample company render
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install chezmoi
        shell: bash
        run: |
          set -euo pipefail
          sh -c "$(curl -fsLS get.chezmoi.io)" -- -b "$HOME/bin"
          echo "$HOME/bin" >> "$GITHUB_PATH"

      - name: Install fish
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y fish

      - name: Copy sanitized sample local data
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$GITHUB_WORKSPACE/.chezmoidata"
          cp "$GITHUB_WORKSPACE/examples/chezmoidata/git.toml" "$GITHUB_WORKSPACE/.chezmoidata/git.toml"
          cp "$GITHUB_WORKSPACE/examples/chezmoidata/fish.toml" "$GITHUB_WORKSPACE/.chezmoidata/fish.toml"
          cp "$GITHUB_WORKSPACE/examples/chezmoidata/homebrew.toml" "$GITHUB_WORKSPACE/.chezmoidata/homebrew.toml"
          cp "$GITHUB_WORKSPACE/examples/chezmoidata/agents.toml" "$GITHUB_WORKSPACE/.chezmoidata/agents.toml"
          cp "$GITHUB_WORKSPACE/examples/chezmoidata/opencode.toml" "$GITHUB_WORKSPACE/.chezmoidata/opencode.toml"
          cp "$GITHUB_WORKSPACE/examples/chezmoidata/vscode.toml" "$GITHUB_WORKSPACE/.chezmoidata/vscode.toml"

      - name: Prepare fake home
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/home"

      - name: Apply with sanitized local data without scripts
        shell: bash
        env:
          HOME: ${{ runner.temp }}/home
        run: |
          set -euo pipefail
          chezmoi \
            --source "$GITHUB_WORKSPACE" \
            --destination "$HOME" \
            apply --exclude scripts --force

      - name: Check rendered company-gated files
        shell: bash
        env:
          HOME: ${{ runner.temp }}/home
        run: |
          set -euo pipefail
          fish -n "$HOME/.config/fish/config.fish"
          fish -n "$HOME/.config/fish/conf.d/local.fish"
          grep -q 'example-gateway/example-model' "$HOME/.config/opencode/opencode.json"
          grep -q 'internal-docs' "$HOME/.config/opencode/opencode.json"
          grep -q 'example-user' "$HOME/.gitconfig-company"
          grep -q 'company/tap/companyctl' "$HOME/Brewfile-company"

      - name: Check VS Code Insiders sample settings
        shell: bash
        env:
          HOME: ${{ runner.temp }}/home
        run: |
          set -euo pipefail
          chezmoi \
            --source "$GITHUB_WORKSPACE" \
            --destination "$HOME" \
            execute-template \
            --file "$GITHUB_WORKSPACE/private_Library/private_Application Support/private_Code - Insiders/User/settings.json.tmpl" \
            > "$RUNNER_TEMP/vscode-insiders-settings.jsonc"
          grep -q 'git.example.internal' "$RUNNER_TEMP/vscode-insiders-settings.jsonc"

  script-smoke:
    name: Script smoke test
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install chezmoi
        shell: bash
        run: |
          set -euo pipefail
          sh -c "$(curl -fsLS get.chezmoi.io)" -- -b "$HOME/bin"
          echo "$HOME/bin" >> "$GITHUB_PATH"

      - name: Prepare CI source and fake home
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/source" "$RUNNER_TEMP/home"
          rsync -a --exclude '.git' "$GITHUB_WORKSPACE/" "$RUNNER_TEMP/source/"

          cat > "$RUNNER_TEMP/source/Brewfile.tmpl" <<'EOF'
          # CI fixture: install uv so MarkItDown can be installed without the full Brewfile.
          brew "uv"
          EOF

          cat > "$RUNNER_TEMP/source/dot_krew-plugin.txt" <<'EOF'
          # CI fixture: intentionally empty to exercise the krew plugin script without installing plugins.
          EOF

      - name: Apply with scripts against fake home
        shell: bash
        env:
          HOME: ${{ runner.temp }}/home
          CHEZMOI_SKIP_BREW_UPDATE: "1"
          CHEZMOI_BREW_BUNDLE_CLEANUP: "0"
          HOMEBREW_NO_AUTO_UPDATE: "1"
          HOMEBREW_NO_INSTALL_CLEANUP: "1"
          HOMEBREW_NO_ANALYTICS: "1"
        run: |
          set -euo pipefail
          chezmoi \
            --source "$RUNNER_TEMP/source" \
            --destination "$HOME" \
            apply --force

      - name: Check script smoke outputs
        shell: bash
        env:
          HOME: ${{ runner.temp }}/home
        run: |
          set -euo pipefail
          test -f "$HOME/Brewfile"
          test -f "$HOME/.krew-plugin.txt"
          test -x "$HOME/.krew/bin/kubectl-krew"
