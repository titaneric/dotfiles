[git.company.user]
name = "example-user"
email = "example@example.com"
signingKey = "EXAMPLEKEY"

[git.company.url]
base = "ssh://git@git.example.internal:22/"
insteadOf = [
  "git@git.example.internal:",
  "https://git.example.internal/",
]

[git.company.oauth]
enabled = false
base = "https://oauth2:<token>@git.example.internal"
insteadOf = [
  "https://git.example.internal",
]

[git.gitAI]
enabled = false
releaseTag = "latest"
trace2EventTarget = "af_unix:stream:$HOME/.git-ai/internal/daemon/trace2.sock"
